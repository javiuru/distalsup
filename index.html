        // --- UTILIDADES ---
        const parseDurationToMinutes = (v) => { if (!v) return 0; if (String(v).includes(':') && !String(v).includes('T')) { const [h, m] = String(v).split(':').map(Number); return (h||0)*60+(m||0); } if (String(v).includes('T')) { const d = new Date(v); return d.getHours()*60+d.getMinutes(); } return 0; };
        const formatMinutesToH = (m) => { const h = Math.floor(m/60); const min = Math.round(m%60); return h===0 ? `${min}m` : `${h}h ${min}m`; };
        const formatMinutesToHoursOnly = (m) => { if(isNaN(m)) return '0'; return Math.round(m / 60); };
        const formatDuration = (v) => formatMinutesToH(parseDurationToMinutes(v));
        const formatDateEU = (d) => { if(!d)return''; const date=new Date(d); if(isNaN(date.getTime()))return d; return `${String(date.getDate()).padStart(2,'0')}-${String(date.getMonth()+1).padStart(2,'0')}-${date.getFullYear()}`; };
        
        const parseNames = (s, exceptions = []) => {
            if (!s) return [];
            let text = s;
            const placeholders = {};
            if (exceptions && exceptions.length > 0) {
                exceptions.forEach((exc, i) => { if (text.includes(exc)) { const token = `__TOKEN${i}__`; placeholders[token] = exc; text = text.split(exc).join(token); } });
            }
            const parts = text.split(/,| y | Y /).map(x => x.trim()).filter(Boolean);
            return parts.map(part => { let restored = part; Object.keys(placeholders).forEach(token => { restored = restored.split(token).join(placeholders[token]); }); return restored; });
        };
        const parseList = (s) => s ? s.split(',').map(x=>x.trim()).filter(Boolean) : [];

        const getPeriodLabel = (type, date) => {
            const y = date.getFullYear(); const m = date.getMonth(); const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            if (type==='Todo') return "Todo el histórico"; if (type==='Año') return `Año ${y}`; if (type==='Semestre') return `${m<6?'1º':'2º'} Semestre ${y}`;
            if (type==='Cuatrimestre') return `${Math.floor(m/4)+1}º Cuatrimestre ${y}`; if (type==='Trimestre') return `${Math.floor(m/3)+1}º Trimestre ${y}`;
            if (type==='Bimensual') return `${months[Math.floor(m/2)*2]} - ${months[Math.floor(m/2)*2+1]} ${y}`;
            if (type==='Mensual') return `${months[m]} ${y}`; if (type==='Semana') { const start=new Date(y,0,1); const diff=date-start+((start.getDay()+1)*86400000)/7; return `Semana ${Math.ceil(diff/604800000)} - ${y}`; }
            return "Periodo";

            const yMax = allValues.length > 0 ? Math.max(...allValues, 0) : 10; const yMin = 0; const yDomain = yMax - yMin;
            const xScale = (index) => padding.left + (index / (data.length - 1)) * (chartWidth - padding.left - padding.right);
            const yScale = (value) => { if (yDomain === 0) return chartHeight - padding.bottom; return chartHeight - padding.bottom - ((value - yMin) / yDomain) * (chartHeight - padding.top - padding.bottom); };
            const createPath = (dataset) => { let path = ''; let inSegment = false; dataset.forEach((point, i) => { if (point !== null && point !== undefined) { if (!inSegment) { path += `M ${xScale(i)} ${yScale(point)} `; inSegment = true; } else { path += `L ${xScale(i)} ${yScale(point)} `; } } else { inSegment = false; } }); return path; };
            const yAxisTicks = []; const tickCount = 5; const step = yDomain > 0 ? yDomain / tickCount : 1;

            const monthlyTrendData = useMemo(() => {
                let rangeStart, rangeEnd, labelOptions = { month: 'short' };
                if (filter.type === 'Todo') {
                    const allDates = [...data.horario, ...data.acciones].map(item => item.Fecha ? new Date(item.Fecha) : null).filter(Boolean);
                    if (allDates.length === 0) return [];
                    const latestDate = new Date(Math.max.apply(null, allDates));
                    rangeEnd = new Date(latestDate.getFullYear(), latestDate.getMonth() + 1, 0);
                    rangeStart = new Date(rangeEnd);
                    rangeStart.setMonth(rangeStart.getMonth() - 15);
                    rangeStart.setDate(1);
                    labelOptions = { month: 'short', year: '2-digit' };
                } else {
                    const { start: s, end: e } = calculateRange(filter.type, filter.refDate);
                    rangeStart = s;

                    if ((e.getFullYear() - s.getFullYear()) * 12 + (e.getMonth() - s.getMonth()) > 24) return [];
                }

                const months = [];
                let current = new Date(rangeStart);
                while (current <= rangeEnd) {
                    months.push({ date: new Date(current), label: current.toLocaleDateString('es-ES', labelOptions), worked: null, coord: null, extra: null, _hasData: false });
                    current.setMonth(current.getMonth() + 1);
                }

                const monthMap = months.reduce((map, month, index) => {
                    const key = `${month.date.getFullYear()}-${month.date.getMonth()}`;
                    map[key] = index;
                    return map;
                }, {});

                const processItems = (items, valueExtractor, targetProp) => {
                    items.forEach(item => {
                        if (!item.Fecha) return;
                        const date = new Date(item.Fecha);
                        const key = `${date.getFullYear()}-${date.getMonth()}`;
                        const index = monthMap[key];

                const actionMinutes = filteredActions.reduce((acc, a) => acc + parseDurationToMinutes(a.Tiempo), 0);
                const coordPercent = totalMinutesWorked > 0 ? (actionMinutes / totalMinutesWorked) * 100 : 0;

                const actionsCount = filteredActions.length;

                return { daysWorked, hoursWorked: totalMinutesWorked, coordHours: actionMinutes, coordPercent: Math.min(coordPercent, 100), totalSaldoMinutes, actionsCount, byDept: { time: groupBy('Departamento', true, 'time').slice(0, 5), count: groupBy('Departamento', true, 'count').slice(0, 5) }, byObj: byObjRaw, byType: groupBy('Tipo', false, 'count') };
            }, [filteredActions, filteredHorario, listas]);

            const objectiveColorMap = useMemo(() => { const map = {}; (listas.OBJETIVO || []).forEach((obj, i) => { map[obj] = OBJECTIVE_COLOR_PALETTE[i % OBJECTIVE_COLOR_PALETTE.length]; }); return map; }, [listas.OBJETIVO]);
            
            const monthlyObjectiveTrendData = useMemo(() => {
                if (!monthlyTrendData || monthlyTrendData.length === 0) return [];
                const trendData = monthlyTrendData.map(m => {
                    const newMonth = { date: m.date, label: m.label };
                    (listas.OBJETIVO || []).forEach(obj => newMonth[obj] = null);

            const timeSeries = useMemo(() => [{ key: 'worked', label: 'Horas Trabajadas', color: 'stroke-slate-400', fill: 'fill-slate-400' }, { key: 'coord', label: 'Horas Coordinación', color: 'stroke-brand-blue', fill: 'fill-brand-blue' }, { key: 'extra', label: 'Horas Extra', color: 'stroke-brand-orange', fill: 'fill-brand-orange' }], []);

            const filteredActions = data.filter(a => { const d = new Date(a.Fecha); const inRange = filter.type === 'Todo' ? true : (d >= start && d <= end); const st = searchTerm.toLowerCase(); const matchesSearch = !searchTerm.trim() || (a.Nombre && String(a.Nombre).toLowerCase().includes(st)) || (a.Departamento && String(a.Departamento).toLowerCase().includes(st)) || (a.Descripción && String(a.Descripción).toLowerCase().includes(st)); return inRange && matchesSearch; }).sort((a,b) => new Date(b.Fecha) - new Date(a.Fecha));

        function HorarioView({ data, listas }) {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [hideWeekends, setHideWeekends] = useState(true);
            const FESTIVOS = ['01-01', '06-01', '23-04', '01-05', '13-05', '15-08', '08-09', '12-10', '01-11', '06-12', '08-12', '25-12'];
            const formatHHMM = (mins) => { if (mins === undefined || mins === null || isNaN(mins)) return ''; const sign = mins < 0 ? '-' : '+'; const m = Math.abs(mins); const hours = Math.floor(m / 60); const minutes = Math.round(m % 60); return `${sign}${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}`; };
            const extractTime = (val) => { if (!val) return ''; if (typeof val === 'string' && val.includes('T')) { const d = new Date(val); if (!isNaN(d.getTime())) return d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false}); } if (typeof val === 'string') return val.substring(0, 5); return val; };
            const toLocalYMD = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
            const weekDays = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
            
            const calendarDays = useMemo(() => {
                const year = currentDate.getFullYear(); const month = currentDate.getMonth(); const firstDayOfMonth = new Date(year, month, 1); const lastDayOfMonth = new Date(year, month + 1, 0); const startDay = firstDayOfMonth.getDay() === 0 ? 6 : firstDayOfMonth.getDay() - 1;
                const days = [];
                for (let i = 0; i < startDay; i++) { days.push({ date: new Date(year, month, 1 - (startDay - i)), isCurrentMonth: false }); }
                for (let i = 1; i <= lastDayOfMonth.getDate(); i++) { days.push({ date: new Date(year, month, i), isCurrentMonth: true }); }
                while (days.length % 7 !== 0) { days.push({ date: new Date(year, month + 1, days.length - (startDay + lastDayOfMonth.getDate()) + 1), isCurrentMonth: false }); }
                return days;
            }, [currentDate]);

            const visibleCalendarDays = useMemo(() => { if (hideWeekends) return calendarDays.filter(dayObj => { const day = dayObj.date.getDay(); return day !== 0 && day !== 6; }); return calendarDays; }, [calendarDays, hideWeekends]);
            
            const monthDays = useMemo(() => {
                const year = currentDate.getFullYear(); const month = currentDate.getMonth(); const lastDay = new Date(year, month + 1, 0).getDate(); const days = [];
                for (let i = 1; i <= lastDay; i++) {
                    const date = new Date(year, month, i); const dayOfWeek = date.getDay(); const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                    if (isWeekend) { const dateStr = toLocalYMD(date); const record = data.find(r => r.Fecha && r.Fecha.substring(0, 10) === dateStr); if (record) days.push({ date, isCurrentMonth: true }); } else { days.push({ date, isCurrentMonth: true }); }

                        <div className="flex items-center gap-2"><label className="text-sm font-medium text-slate-600 dark:text-slate-400">Ocultar Finde</label><input type="checkbox" checked={hideWeekends} onChange={() => setHideWeekends(!hideWeekends)} className="w-5 h-5 text-brand-blue rounded focus:ring-brand-blue" /></div>

                            <div className={`grid ${gridCols} gap-2`}>{visibleCalendarDays.map((dayObj, i) => { const dateStr = toLocalYMD(dayObj.date); const dayStrEU = `${String(dayObj.date.getDate()).padStart(2,'0')}-${String(dayObj.date.getMonth()+1).padStart(2,'0')}`; const isFestivoCalendario = FESTIVOS.includes(dayStrEU); const record = data.find(r => r.Fecha && r.Fecha.substring(0, 10) === dateStr); const isToday = new Date().toDateString() === dayObj.date.toDateString(); const opacity = dayObj.isCurrentMonth ? 'opacity-100' : 'opacity-40'; const bg = isFestivoCalendario ? 'bg-red-50 dark:bg-red-900/20' : (isToday ? 'bg-sky-50 dark:bg-sky-900/20 ring-1 ring-brand-blue' : 'bg-slate-50 dark:bg-slate-700/30'); const status = record?.['Estado/Ausencia']; const showData = record && (status === 'Laboral' || status === 'Festivo trabajado' || !status); return (<div key={i} className={`relative rounded-lg border border-slate-100 dark:border-slate-700 flex min-h-[6rem] overflow-hidden ${opacity} ${bg}`}><div className={`w-20 flex-none flex items-center justify-center border-r ${isFestivoCalendario ? 'border-red-200 dark:border-red-800/50' : 'border-slate-200 dark:border-slate-700'} bg-white/50 dark:bg-black/10`}><span className={`text-4xl font-bold ${isFestivoCalendario ? 'text-red-500' : 'text-slate-700 dark:text-slate-300'}`}>{dayObj.date.getDate()}</span></div><div className="flex-1 relative">{showData ? (<div className="flex flex-col justify-center h-full p-2 px-3 gap-1"><div className="flex justify-between items-baseline"><span className="text-xs text-slate-500 dark:text-slate-400 uppercase font-bold tracking-wider">Entrada</span> <span className="text-lg font-mono font-bold text-slate-800 dark:text-white">{extractTime(record?.Entrada)}</span></div><div className="flex justify-between items-baseline"><span className="text-xs text-slate-500 dark:text-slate-400 uppercase font-bold tracking-wider">Salida</span> <span className="text-lg font-mono font-bold text-slate-800 dark:text-white">{extractTime(record?.Salida)}</span></div>{record?.Saldo && (<div className={`text-right font-mono text-base font-bold ${record.Saldo >= 0 ? 'text-green-600' : 'text-red-500'}`}>{formatHHMM(record.Saldo)}</div>)}{status === 'Festivo trabajado' && <div className="mt-1 flex justify-end"><Badge colorClass="bg-orange-100 text-orange-800">Festivo trabajado</Badge></div>}</div>) : (<div className="flex items-center justify-center h-full">{status ? (<Badge colorClass="bg-slate-200 text-slate-700 text-xs py-1 px-2">{status}</Badge>) : (isFestivoCalendario && <span className="text-xs font-bold text-red-400 uppercase border border-red-200 px-2 py-1 rounded">Festivo</span>)}</div>)}</div></div>); })}</div>
                        </div>
                        <div className="lg:hidden flex flex-col gap-2">{monthDays.map((dayObj, i) => { const dateStr = toLocalYMD(dayObj.date); const dayStrEU = `${String(dayObj.date.getDate()).padStart(2,'0')}-${String(dayObj.date.getMonth()+1).padStart(2,'0')}`; const isFestivoCalendario = FESTIVOS.includes(dayStrEU); const record = data.find(r => r.Fecha && r.Fecha.substring(0, 10) === dateStr); const isToday = new Date().toDateString() === dayObj.date.toDateString(); const bg = isFestivoCalendario ? 'bg-red-50 dark:bg-red-900/20' : (isToday ? 'bg-sky-50 dark:bg-sky-900/20 ring-1 ring-brand-blue' : 'bg-slate-50 dark:bg-slate-700/30'); const status = record?.['Estado/Ausencia']; const showData = record && (status === 'Laboral' || status === 'Festivo trabajado' || !status); const dayOfWeek = weekDays[dayObj.date.getDay() === 0 ? 6 : dayObj.date.getDay() - 1]; return (<div key={i} className={`flex items-center justify-between p-3 rounded-lg ${bg}`}><div className="flex items-center gap-3"><span className={`text-xl font-bold ${isFestivoCalendario ? 'text-red-500' : 'text-slate-700 dark:text-slate-300'}`}>{dayObj.date.getDate()}</span><span className="text-sm font-medium text-slate-500 dark:text-slate-400">{dayOfWeek.substring(0,3)}.</span></div><div className="flex-1 text-center">{showData ? (<div className="flex flex-col items-center font-mono text-sm"><div><span className="text-xs text-slate-400">E:</span> {extractTime(record?.Entrada)} <span className="text-xs text-slate-400 ml-2">S:</span> {extractTime(record?.Salida)}</div>{record?.Saldo !== null && record?.Saldo !== undefined && (<div className={`font-bold text-base ${record.Saldo >= 0 ? 'text-green-600' : 'text-red-500'}`}>{formatHHMM(record.Saldo)}</div>)}</div>) : (<div className="min-h-[2.5rem] flex items-center justify-center">{status ? (<Badge colorClass="bg-slate-200 text-slate-700 text-xs py-1 px-2">{status}</Badge>) : (isFestivoCalendario && <span className="text-xs font-bold text-red-400 uppercase border border-red-200 px-2 py-1 rounded">Festivo</span>)}</div>)}</div></div>); })}</div>
                    </div>

        function App() {

                        <div className="px-2 mb-6"><Logo className="w-full h-auto" /></div>
                        <NavButton icon={Icons.LayoutDashboard} label="Dashboard" active={view === 'dashboard'} onClick={() => setView('dashboard')} />
                        <NavButton icon={Icons.Target} label="Acciones" active={view === 'acciones'} onClick={() => setView('acciones')} />
                        <NavButton icon={Icons.Calendar} label="Horario" active={view === 'horario'} onClick={() => setView('horario')} />
                        <div className="mt-auto pt-4 border-t border-slate-200 dark:border-slate-800">
                            <button onClick={() => setDarkMode(!darkMode)} className="flex items-center gap-2 w-full px-4 py-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                                {darkMode ? <Icons.Sun size={18} /> : <Icons.Moon size={18} />} {darkMode ? 'Modo Claro' : 'Modo Oscuro'}
                            </button>
                        </div>
                    </aside>
                    <main className="flex-1 overflow-auto p-4 md:p-8 pb-24 md:pb-8">
                        {(view === 'dashboard' || view === 'acciones') && <FilterBar filter={filter} onFilterChange={setFilter} />}
                        {renderView()}
                    </main>
                    <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 shadow-t-lg z-50">
                        <div className="flex justify-around items-center h-16">
                            <BottomNavButton icon={Icons.LayoutDashboard} label="Dashboard" active={view === 'dashboard'} onClick={() => setView('dashboard')} />
                            <BottomNavButton icon={Icons.Target} label="Acciones" active={view === 'acciones'} onClick={() => setView('acciones')} />
                            <BottomNavButton icon={Icons.Calendar} label="Horario" active={view === 'horario'} onClick={() => setView('horario')} />
                            <BottomNavButton icon={darkMode ? Icons.Sun : Icons.Moon} label={darkMode ? 'Claro' : 'Oscuro'} onClick={() => setDarkMode(!darkMode)} />
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
